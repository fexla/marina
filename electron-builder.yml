# electron-builder 打包配置
#
# 三平台 target 模板齐全 (软件定义书 12.4 节),V1 只启用 Windows。
# macOS / Linux 配置保留但不在 npm run build 触发,留给社区贡献者。
#
# 对应文档:软件定义书.md 第 14 章 (开源策略)、AGENTS.md 4.2 (CP-4 打包要求)
#
# 改名变更 (v1.5,2026-05-12):产品名从 EasyTerm 改为 Marina。
# appId 变更会让 Windows 把它视为新产品(独立安装项 + 独立 userData 目录),
# 旧 EasyTerm 数据目录 %APPDATA%\EasyTerm 需手动迁移到 %APPDATA%\Marina,
# 详见 docs/marina-改名工作记录-20260512.md。

appId: com.liyue-cheng.marina
productName: Marina
copyright: Copyright (c) 2026 Liyue-Cheng

directories:
  output: release/${version}
  buildResources: build

files:
  - out/**/*
  - package.json
  - '!**/node_modules/*/{CHANGELOG.md,README.md,readme.md,readme}'
  - '!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples}'
  - '!**/node_modules/*.d.ts'
  - '!**/node_modules/.bin'

asar: true
asarUnpack:
  - node_modules/node-pty/**

# Windows: V1 唯一发布目标
#
# M1-E:source 设计图标 build/icon.svg 已就位;.ico 需要离线转换一次,
# 见 build/README.md。.ico 出来后取消 icon: 行注释即可一次性接通三处
# (win 主图标 / nsis 安装器 / nsis 卸载器)。
win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  artifactName: ${productName}-Setup-${version}-${arch}.${ext}
  # icon: build/icon.ico
  requestedExecutionLevel: asInvoker

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Marina
  # installerIcon: build/icon.ico
  # uninstallerIcon: build/icon.ico

portable:
  artifactName: ${productName}-Portable-${version}-${arch}.${ext}

# macOS / Linux 占位 (V2.0 由社区贡献者启用)
mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  category: public.app-category.developer-tools
  # icon: build/icon.icns

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Development
  # icon: build/icon.png
